<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <style>
      /* Discrete Outer Matrix Pulse Timeline (Flaress sequentially for ~0.6s) */
      @keyframes discrete-pulse {
        0%, 90%, 100% { 
          fill: #334155; 
          opacity: 0.4; 
          filter: none;
        }
        95% { 
          fill: #06b6d4; 
          opacity: 1.0; 
          filter: drop-shadow(0 0 2px #06b6d4);
        }
      }

      /* Central Core Heartbeat Pulse Timeline (Continuous smooth breathing loop) */
      @keyframes core-pulse-timeline {
        0%, 100% {
          transform: scale(1);
          opacity: 0.75;
        }
        50% {
          transform: scale(1.25);
          opacity: 1.0;
        }
      }

      /* Master Pulse Base Class for Outer Nodes */
      .pulse-node {
        animation: discrete-pulse 9s infinite ease-in-out;
      }

      /* Heartbeat Pulse Class for 00. IRONCORE */
      .core-node {
        animation: core-pulse-timeline 2.5s infinite ease-in-out;
        transform-origin: 0px 0px; /* Aligns rotation/scale perfectly at the shared group center */
      }
    </style>

    <filter id="quantum-glow" x="-400%" y="-400%" width="900%" height="900%">
      <feGaussianBlur stdDeviation="0.08" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <radialGradient id="internal-refraction" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.4" />
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#060b13" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="top-face-glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18" />
      <stop offset="40%" stop-color="#06b6d4" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.08" />
    </linearGradient>

    <linearGradient id="left-face-glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#0b1322" stop-opacity="0.6" />
    </linearGradient>

    <linearGradient id="right-face-glass" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#050a12" stop-opacity="0.7" />
    </linearGradient>

    <linearGradient id="specular-sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4" />
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>

    <polygon id="femto-node" points="0,-0.035 0.03,-0.017 0.03,0.017 0,0.035 -0.03,0.017 -0.03,-0.017" />
  </defs>

  <g stroke="rgba(6, 182, 212, 0.12)" stroke-width="1" fill="none">
    <line x1="200" y1="90" x2="200" y2="200" stroke-dasharray="2 2" />
    <line x1="105" y1="255" x2="200" y2="200" stroke-dasharray="2 2" />
    <line x1="295" y1="255" x2="200" y2="200" stroke-dasharray="2 2" />
  </g>

  <circle cx="200" cy="200" r="65" fill="url(#internal-refraction)" />

  <g transform="translate(200, 200) scale(175)" fill="none" stroke="none">
    
    <use href="#femto-node" x="-0.16" y="-0.2772" class="pulse-node" style="animation-delay: 0.0s;" />
    <use href="#femto-node" x="0" y="-0.2772" class="pulse-node" style="animation-delay: 2.5s;" />
    <use href="#femto-node" x="0.16" y="-0.2772" class="pulse-node" style="animation-delay: 5.0s;" />
    <use href="#femto-node" x="-0.24" y="-0.1386" class="pulse-node" style="animation-delay: 1.5s;" />
    <use href="#femto-node" x="0.24" y="-0.1386" class="pulse-node" style="animation-delay: 7.0s;" />
    <use href="#femto-node" x="-0.32" y="0" class="pulse-node" style="animation-delay: 3.5s;" />
    <use href="#femto-node" x="0.32" y="0" class="pulse-node" style="animation-delay: 8.0s;" />
    <use href="#femto-node" x="-0.24" y="0.1386" class="pulse-node" style="animation-delay: 6.0s;" />
    <use href="#femto-node" x="0.24" y="0.1386" class="pulse-node" style="animation-delay: 1.0s;" />
    <use href="#femto-node" x="-0.16" y="0.2772" class="pulse-node" style="animation-delay: 4.5s;" />
    <use href="#femto-node" x="0" y="0.2772" class="pulse-node" style="animation-delay: 2.0s;" />
    <use href="#femto-node" x="0.16" y="0.2772" class="pulse-node" style="animation-delay: 7.5s;" />

    <use href="#femto-node" x="-0.08" y="-0.1386" class="pulse-node" style="animation-delay: 3.0s;" />
    <use href="#femto-node" x="0.08" y="-0.1386" class="pulse-node" style="animation-delay: 6.5s;" />
    <use href="#femto-node" x="-0.16" y="0" class="pulse-node" style="animation-delay: 0.5s;" />
    <use href="#femto-node" x="0.16" y="0" class="pulse-node" style="animation-delay: 4.0s;" />
    <use href="#femto-node" x="-0.08" y="0.1386" class="pulse-node" style="animation-delay: 8.5s;" />
    <use href="#femto-node" x="0.08" y="0.1386" class="pulse-node" style="animation-delay: 5.5s;" />

    <g class="core-node">
      <use href="#femto-node" x="0" y="0" fill="#10b981" filter="url(#quantum-glow)" />
      <circle cx="0" cy="0" r="0.06" fill="none" stroke="#06b6d4" stroke-width="0.008" stroke-dasharray="0.01 0.01" opacity="0.95" />
    </g>
  </g>

  <polygon points="105,145 200,200 200,310 105,255" fill="url(#left-face-glass)" stroke="#1e293b" stroke-width="1.5" />
  <polygon points="200,200 295,145 295,255 200,310" fill="url(#right-face-glass)" stroke="#162235" stroke-width="1.5" />
  <polygon points="200,90 295,145 200,200 105,145" fill="url(#top-face-glass)" stroke="#475569" stroke-width="1.5" />

  <g stroke="#06b6d4" stroke-width="2" stroke-linecap="round" opacity="0.4">
    <line x1="200" y1="90" x2="295" y2="145" />
    <line x1="200" y1="90" x2="105" y2="145" />
    <line x1="200" y1="200" x2="200" y2="310" stroke="#ffffff" stroke-width="2.5" opacity="0.6" />
  </g>

  <polygon points="135,135 180,110 245,147 200,172" fill="url(#specular-sheen)" opacity="0.3" pointer-events="none" />
</svg>

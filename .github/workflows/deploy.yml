name: 🚀 Sovereign Deploy (GCP)

on:
  push:
    branches: [ "release/v1.0.0", "main" ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: sovereign-sentinel
  REGION: us-central1
  DATABASE_URL: postgresql://postgres:postgres_password@127.0.0.1:5432/ironframe_test
  DIRECT_URL: postgresql://postgres:postgres_password@127.0.0.1:5432/ironframe_test
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
  GOOGLE_API_KEY: ci-vitest-compile-placeholder

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:15
        env:
          POSTGRES_DB: ironframe_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Ironleads subpackage
        run: npm run ironleads:install

      - name: Configure CI database env
        run: |
          {
            echo "DATABASE_URL=${{ env.DATABASE_URL }}"
            echo "DIRECT_URL=${{ env.DIRECT_URL }}"
            echo "SHADOW_PLANE_ACTIVE=0"
            echo "NEXT_PUBLIC_SHADOW_PLANE_ACTIVE=0"
            echo "NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
            echo "GOOGLE_API_KEY=${{ env.GOOGLE_API_KEY }}"
          } > .env.local

      - name: Bootstrap ephemeral Postgres schema
        env:
          PGPASSWORD: postgres_password
          PGUSER: postgres
          PGDATABASE: ironframe_test
        run: node scripts/ci-bootstrap-postgres.mjs

      - name: Constitutional client generation
        run: npm run generate:all

      - name: Execute Sovereign Test Suite
        run: npm test
        env:
          CI: true
          PGPASSWORD: postgres_password
          PGUSER: postgres
          PGDATABASE: ironframe_test
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY || 'ci-vitest-compile-placeholder' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: 🔐 Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 📦 Build and Push to Artifact Registry
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env.production
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env.production
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env.production
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env.production
          
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
          docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/sentinel-repo/$SERVICE_NAME:$GITHUB_SHA .
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/sentinel-repo/$SERVICE_NAME:$GITHUB_SHA

      - name: 🚀 Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/sentinel-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: >-
            --allow-unauthenticated
            --memory=1Gi
            --cpu=1
            --service-account=ironframe-gcp-sa-key@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

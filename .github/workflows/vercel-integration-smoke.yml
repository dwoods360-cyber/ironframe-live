name: Vercel Integration Smoke

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      staging_smoke_base_url:
        description: "Vercel preview URL (e.g. https://ironframe-live-xxx.vercel.app)"
        required: false
        type: string

jobs:
  epic12-vitest:
    name: Epic 12 attestation matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install workforce subpackages
        run: |
          npm run ironleads:install
          npm run salesteam:install
          npm run successteam:install
      - name: Epic 12 unit + integration tests
        run: npm run test:integration:epic12

  vercel-live-smoke:
    name: Live Vercel cron smoke
    runs-on: ubuntu-latest
    needs: epic12-vitest
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.staging_smoke_base_url != '') ||
      (github.event_name == 'pull_request' && vars.VERCEL_PREVIEW_SMOKE_ENABLED == 'true')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Cron route smoke against preview
        env:
          STAGING_SMOKE_BASE_URL: ${{ inputs.staging_smoke_base_url || secrets.STAGING_SMOKE_BASE_URL }}
          IRONFRAME_CRON_SECRET: ${{ secrets.IRONFRAME_CRON_SECRET }}
          VERCEL_BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
        run: node scripts/staging-smoke-cron.mjs

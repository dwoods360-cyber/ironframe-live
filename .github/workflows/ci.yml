name: Ironframe CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop] # This ensures mutation testing only happens on "official" me

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Dependencies
        run: npm install # Use install to patch SWC locally
      - name: Constitutional Generation
        run: npm run generate:all # Ensures dual generation + tsc check
      - name: Run Lint
        run: npm run lint
      - name: Run Unit Tests
        run: npm run test
      - name: Epic 11 vault PKI gates (required)
        run: |
          npx vitest run tests/unit/pkiSignatureVerifier.test.ts tests/unit/bankVaultDualGate.test.ts
          npx vitest run tests/integration/bank-vault-success.test.ts tests/integration/bank-vault-rejection.test.ts
      - name: Run Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'REDACTED_SUPABASE_JWT' }}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>The Governance Frame · Ironframe</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        font-family: Georgia, "Times New Roman", serif;
        color: #0f172a;
      }
      main {
        max-width: 32rem;
        padding: 2.5rem 1.5rem;
        text-align: center;
      }
      .kicker {
        font-family: "Courier New", monospace;
        font-size: 0.65rem;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: #64748b;
      }
      h1 {
        margin: 0.75rem 0 0.5rem;
        font-size: 1.75rem;
        font-weight: 700;
      }
      p {
        margin: 0 0 1.25rem;
        font-family: system-ui, Arial, sans-serif;
        font-size: 0.95rem;
        line-height: 1.6;
        color: #475569;
      }
      a {
        display: inline-block;
        margin: 0.35rem;
        padding: 0.75rem 1.25rem;
        border: 1px solid #cbd5e1;
        border-radius: 0.375rem;
        background: #ffffff;
        color: #0f172a;
        font-family: system-ui, Arial, sans-serif;
        font-size: 0.85rem;
        font-weight: 600;
        text-decoration: none;
      }
      a:hover {
        background: #f1f5f9;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="kicker">Ironframe System Intelligence</p>
      <h1>The Governance Frame</h1>
      <p>Immutable executive GRC intelligence — static distribution edge for RSS and brand assets.</p>
      <a href="/rss.xml">Subscribe via RSS</a>
      <a href="/assets/Ironframe_logo.svg">Brand mark (SVG)</a>
    </main>
  </body>
</html>

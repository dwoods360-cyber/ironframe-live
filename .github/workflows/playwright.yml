name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DATABASE_URL: postgresql://postgres:postgres_password@localhost:5432/ironframe_test
  DIRECT_URL: postgresql://postgres:postgres_password@localhost:5432/ironframe_test

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ironframe_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "Postgres is ready."
              exit 0
            fi
            echo "Waiting for Postgres ($i/30)..."
            sleep 2
          done
          echo "Postgres did not become ready in time."
          exit 1

      - name: Prisma generate
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npx prisma db seed

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Generate Local Environment File
        run: |
          {
            echo "DATABASE_URL=${{ env.DATABASE_URL }}"
            echo "DIRECT_URL=${{ env.DIRECT_URL }}"
            echo "SHADOW_PLANE_ACTIVE=1"
            echo "NEXT_PUBLIC_SHADOW_PLANE_ACTIVE=1"
            echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'REDACTED_SUPABASE_JWT' }}"
          } >> .env.local

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30

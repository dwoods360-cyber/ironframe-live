name: Ironframe CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DATABASE_URL: postgresql://postgres:postgres_password@127.0.0.1:5432/ironframe_test
  DIRECT_URL: postgresql://postgres:postgres_password@127.0.0.1:5432/ironframe_test
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
  GOOGLE_API_KEY: ci-vitest-compile-placeholder

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        # ECR Public mirror — avoids Docker Hub auth.docker.io timeouts on GHA runners.
        image: public.ecr.aws/docker/library/postgres:15
        env:
          POSTGRES_DB: ironframe_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Ironleads subpackage
        run: npm run ironleads:install

      - name: Install SalesTeam subpackage
        run: npm run salesteam:install

      - name: Install SuccessTeam subpackage
        run: npm run successteam:install

      # Committed .env points at Supabase; pin CI URLs before Prisma/Next read env files.
      - name: Configure CI database env
        run: |
          {
            echo "DATABASE_URL=${{ env.DATABASE_URL }}"
            echo "DIRECT_URL=${{ env.DIRECT_URL }}"
            echo "IRONLEADS_DATABASE_URL=file:./Ironleads/data/ironleads-ci.db"
            echo "SHADOW_PLANE_ACTIVE=0"
            echo "NEXT_PUBLIC_SHADOW_PLANE_ACTIVE=0"
            echo "NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
            echo "GOOGLE_API_KEY=${{ env.GOOGLE_API_KEY }}"
          } > .env.local

      - name: Bootstrap ephemeral Postgres schema
        env:
          PGPASSWORD: postgres_password
          PGUSER: postgres
          PGDATABASE: ironframe_test
        run: node scripts/ci-bootstrap-postgres.mjs

      - name: Constitutional Generation
        run: npm run generate:all

      - name: Run Lint
        run: npm run lint
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: 🔒 Validate Cross-Origin Session Perimeter
        run: npx vitest run tests/unit/sessionBootstrapPerimeter.test.ts
        env:
          NODE_ENV: test
          SUPABASE_AUTH_JWT_SECRET: ${{ secrets.TEST_SUPABASE_AUTH_JWT_SECRET }}
          GOOGLE_API_KEY: ${{ env.GOOGLE_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: 🔒 Governance Frame Briefing Perimeter
        run: npm run test:perimeter:briefing
        env:
          GOOGLE_API_KEY: ${{ env.GOOGLE_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Run Unit Tests
        run: npx vitest run --pool forks --maxWorkers 2 --exclude tests/unit/sessionBootstrapPerimeter.test.ts
        env:
          GOOGLE_API_KEY: ${{ env.GOOGLE_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Constitutional TAS gold parity
        run: npx vitest run tests/unit/tasGoldImageParity.test.ts

      - name: Epic 17 billing and onboarding gate matrix
        run: >-
          npx vitest run
          tests/unit/tenantBillingActiveGate.test.ts
          tests/unit/billingWebhookRoute.test.ts
          tests/unit/ironqueryExportBillingGate.test.ts
          tests/unit/vendorEvidenceRequirements.test.ts
          tests/unit/workspaceInvitationRecovery.test.ts
        env:
          GOOGLE_API_KEY: ${{ env.GOOGLE_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Epic 12 WORM matrix
        run: npm run test:integration:epic12

      - name: Epic 15 checkpoint rollback matrix
        run: npm run test:integration:epic15

      - name: Secret Scan & Epic 11 Vault PKI Gates (Required)
        run: npm run test:integration:epic11

      - name: Run Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder' }}

  typecheck-ironboard:
    name: Ironboard Subpackage Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install root deps and generate Prisma client
        run: npm ci && npx prisma generate
      - name: Install Subpackage Deps
        run: cd Ironboard && npm ci
      - name: Run Subpackage Typecheck
        run: cd Ironboard && npx tsc --noEmit

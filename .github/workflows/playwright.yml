name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  # Use 127.0.0.1 (not localhost) — GHA service port maps can fail on ::1.
  DATABASE_URL: postgresql://postgres:postgres_password@127.0.0.1:5432/ironframe_test
  DIRECT_URL: postgresql://postgres:postgres_password@127.0.0.1:5432/ironframe_test

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:15
        env:
          POSTGRES_DB: ironframe_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # prisma.config.ts loads .env then .env.local (override). The repo .env points at
      # Supabase; write CI URLs before any Prisma CLI so push/seed hit ephemeral Postgres.
      - name: Configure CI database env
        run: |
          {
            echo "DATABASE_URL=${{ env.DATABASE_URL }}"
            echo "DIRECT_URL=${{ env.DIRECT_URL }}"
          } > .env.local

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h 127.0.0.1 -p 5432 -U postgres; then
              echo "Postgres is ready."
              exit 0
            fi
            echo "Waiting for Postgres ($i/30)..."
            sleep 2
          done
          echo "Postgres did not become ready in time."
          exit 1

      - name: Verify Postgres connectivity
        env:
          PGPASSWORD: postgres_password
        run: psql -h 127.0.0.1 -U postgres -d ironframe_test -c 'SELECT 1 AS ok'

      - name: Prisma generate
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DIRECT_URL: ${{ env.DIRECT_URL }}

      # Fresh CI DB: migrate deploy fails (quarantine_ledger ALTER before CREATE). db push
      # also exits 1 in ~2s on GHA; apply schema SQL from migrate diff + Ironguard GUC.
      - name: Apply database schema
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DIRECT_URL: ${{ env.DIRECT_URL }}
          PGPASSWORD: postgres_password
        run: |
          set -euo pipefail
          npx prisma migrate diff \
            --from-empty \
            --to-schema-datamodel prisma/schema.prisma \
            --script 2>prisma-diff.err > prisma-schema.sql
          # Prisma maps governed_impact to cross-column DEFAULT; Postgres requires GENERATED STORED.
          sed -i 's/"governed_impact" BIGINT NOT NULL DEFAULT ((base_impact_cents \* governance_impact_multiplier) \/ 100),/"governed_impact" BIGINT NOT NULL GENERATED ALWAYS AS (((base_impact_cents * governance_impact_multiplier) \/ 100)) STORED,/' prisma-schema.sql
          head -n 3 prisma-schema.sql
          psql -h 127.0.0.1 -U postgres -d ironframe_test -v ON_ERROR_STOP=1 -f prisma-schema.sql
          psql -h 127.0.0.1 -U postgres -d ironframe_test -v ON_ERROR_STOP=1 \
            -f prisma/migrations/20260507200000_ironguard_session_tenant_guc/migration.sql

      - name: Seed database
        run: npx prisma db seed
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DIRECT_URL: ${{ env.DIRECT_URL }}

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Append Playwright runtime env
        run: |
          {
            echo "SHADOW_PLANE_ACTIVE=1"
            echo "NEXT_PUBLIC_SHADOW_PLANE_ACTIVE=1"
            echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder' }}"
          } >> .env.local

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-debug
          path: |
            playwright-report/
            test-results/
            prisma-schema.sql
          retention-days: 30
          if-no-files-found: ignore

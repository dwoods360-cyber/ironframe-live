name: Ironframe CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DATABASE_URL: postgresql://postgres:postgres_password@127.0.0.1:5432/ironframe_test
  DIRECT_URL: postgresql://postgres:postgres_password@127.0.0.1:5432/ironframe_test
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
  GOOGLE_API_KEY: ci-vitest-compile-placeholder

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ironframe_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      # Committed .env points at Supabase; pin CI URLs before Prisma/Next read env files.
      - name: Configure CI database env
        run: |
          {
            echo "DATABASE_URL=${{ env.DATABASE_URL }}"
            echo "DIRECT_URL=${{ env.DIRECT_URL }}"
            echo "SHADOW_PLANE_ACTIVE=0"
            echo "NEXT_PUBLIC_SHADOW_PLANE_ACTIVE=0"
            echo "NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
            echo "GOOGLE_API_KEY=${{ env.GOOGLE_API_KEY }}"
          } > .env.local

      - name: Bootstrap ephemeral Postgres schema
        env:
          PGPASSWORD: postgres_password
          PGUSER: postgres
          PGDATABASE: ironframe_test
        run: node scripts/ci-bootstrap-postgres.mjs

      - name: Constitutional Generation
        run: npm run generate:all

      - name: Run Lint
        run: npm run lint
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Run Unit Tests
        run: npx vitest run --pool forks --maxWorkers 2
        env:
          GOOGLE_API_KEY: ${{ env.GOOGLE_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ env.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Epic 12 WORM matrix
        run: npm run test:integration:epic12

      - name: Epic 15 checkpoint rollback matrix
        run: npm run test:integration:epic15

      - name: Secret Scan & Epic 11 Vault PKI Gates (Required)
        run: npm run test:integration:epic11

      - name: Run Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder' }}
